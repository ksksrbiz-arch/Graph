# PKG-VS local development stack — spec §13.1
# Bring up (infra only):   docker compose up -d  (or `pnpm stack:up`)
# Bring up (full stack):   docker compose --profile full up --build
# Brings down:             docker compose down
#
# Default: only infra services start so `pnpm --filter @pkg/api start:dev` can
# run the API on the host in watch-mode.
# Full-stack mode: add `--profile full` to also build and start the api container.
# The web service is always optional — uncomment when needed.

services:
  neo4j:
    image: neo4j:5
    container_name: pkg-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:15
    container_name: pkg-postgres
    environment:
      POSTGRES_USER: pkg
      POSTGRES_PASSWORD: pkg
      POSTGRES_DB: pkg
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pkg -d pkg"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pkg-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: pkg-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev-master-key-change-me}
      MEILI_ENV: development
    ports:
      - "7701:7700"
    volumes:
      - meili_data:/meili_data
    # The Meilisearch image (Debian slim) ships without curl, wget, or bash,
    # so no in-container HTTP or TCP probe is feasible. Use a no-op healthcheck
    # here; the api's own /health/ready endpoint validates Meilisearch over HTTP
    # before the api container itself turns healthy.
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # API service — builds the full NestJS stack in-container via apps/api/Dockerfile.
  # Enabled with `--profile full` so that `pnpm stack:up` / `docker compose up -d`
  # (without --profile) leaves port 3001 free for host-side watch-mode dev.
  #
  # Full-stack: docker compose --profile full up --build
  # Host dev:   pnpm stack:up && pnpm --filter @pkg/api start:dev
  api:
    profiles: [full]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pkg-api
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      POSTGRES_URL: postgresql://pkg:pkg@postgres:5432/pkg
      REDIS_URL: redis://redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev-master-key-change-me}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-32-bytes-minimum-xx}
      KEK_BASE64: ${KEK_BASE64:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      PUBLIC_INGEST_USER_IDS: ${PUBLIC_INGEST_USER_IDS:-local}
    ports:
      - "3001:3001"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # web:
  #   profiles: [full]
  #   build: ./apps/web
  #   container_name: pkg-web
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:3001
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     api:
  #       condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
  meili_data:
