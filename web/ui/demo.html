<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Graph UI v2 — Demo (Early Build)</title>
  <style>
    html, body { margin:0; padding:0; height:100%; background:#0a0a0f; color:#ddd; font-family: system-ui, sans-serif; }
    #canvas { width: 100%; height: 100%; }
    .overlay {
      position: absolute; top: 20px; left: 20px;
      background: rgba(15,15,25,0.85); padding: 12px 18px; border-radius: 8px;
      font-size: 13px; border: 1px solid rgba(100,120,255,0.2);
    }
  </style>
</head>
<body>
  <div id="canvas" style="width:100%; height:100%;"></div>
  <div class="overlay">
    Graph UI v2 — High-Effort Rebuild (Early Scaffolding)<br>
    <small>BrainSystem + advanced renderer integration active</small>
  </div>

  <script type="module">
    import { createGraphUI } from './index.js';

    const container = document.getElementById('canvas');

    const ui = createGraphUI(container, {
      initialState: {
        config: { dimensions: 2 }
      }
    });

    // Mount beautiful brain status HUD
    import('./hud/BrainStatus.js').then(({ createBrainStatus }) => {
      if (ui.brainSystem) {
        createBrainStatus(container, ui.brainSystem);
      }
    });

    // === Impressive Interactive Demo ===
    let demoNodes = [];
    let demoEdges = [];

    function generateDemoGraph(count = 55) {
      demoNodes = Array.from({ length: count }, (_, i) => ({
        id: `n${i}`,
        label: `Concept ${i}`,
        type: i % 4 === 0 ? 'person' : (i % 3 === 0 ? 'note' : 'concept'),
        __degree: 2 + Math.floor(Math.random() * 9)
      }));

      demoEdges = [];
      for (let i = 0; i < count * 1.4; i++) {
        const a = Math.floor(Math.random() * count);
        let b = Math.floor(Math.random() * count);
        if (b === a) b = (a + 1) % count;
        demoEdges.push({ 
          source: demoNodes[a].id, 
          target: demoNodes[b].id, 
          weight: 0.25 + Math.random() * 0.75 
        });
      }
    }

    function loadGraph() {
      generateDemoGraph(55);
      ui.setGraph({ nodes: demoNodes, edges: demoEdges });

      // Initial brain activity
      setTimeout(() => {
        if (ui.brainSystem) {
          const active = demoNodes.slice(0, 9).map(n => n.id);
          ui.brainSystem.onNodesArrived(active, 0.9);
          ui.brainSystem.focusOn(demoNodes[2].id, 1.0);
        }
      }, 650);
    }

    // Interactions are now primarily handled by the InteractionManager (wired in GraphView).
    // The demo still has some direct keyboard controls for convenience.

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (!ui.brainSystem) return;

      if (e.key.toLowerCase() === 'd') {
        ui.brainSystem.enterDreamMode(0.85);
      }
      if (e.key.toLowerCase() === 'a') {
        ui.brainSystem.exitDreamMode();
      }
      if (e.key === 'r' || e.key === 'R') {
        if (ui.renderer) ui.renderer.fit(380);
      }
    });

    // Load impressive demo
    setTimeout(() => {
      loadGraph();

      // Periodic brain "life"
      setInterval(() => {
        if (ui.brainSystem && demoNodes.length > 0) {
          const randomNodes = [];
          for (let i = 0; i < 3; i++) {
            randomNodes.push(demoNodes[Math.floor(Math.random() * demoNodes.length)].id);
          }
          ui.brainSystem.onNodesArrived(randomNodes, 0.55);
        }
      }, 4200);
    }, 380);

    console.log('%c[UI v2 Demo] High-effort rebuild demo loaded. Click nodes, press D for dream mode, R to fit, A to wake up.', 'color:#67e8f9');
  </script>

  <div style="position:absolute; bottom:16px; right:16px; font-size:11px; opacity:0.6;">
    Click nodes to focus • Press <b>D</b> = Dream • <b>A</b> = Awake • <b>R</b> = Fit
  </div>
</body>
</html>
