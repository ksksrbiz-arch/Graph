openapi: 3.1.0
info:
  title: PKG-VS API
  version: 1.0.0
  summary: Personal Knowledge Graph Visualization System — REST contract
  description: |
    Generated alongside spec §6.1. Phase 0 ships the contract; many endpoints
    are stubs in the API until later phases land. The OpenAPI document is the
    source of truth for client-side TypeScript types (Rule 7).
  license:
    name: Proprietary

servers:
  - url: http://localhost:3001/api/v1
    description: local dev

security:
  - bearerAuth: []

tags:
  - name: auth
  - name: oauth
  - name: graph
  - name: connectors
  - name: brain-insights
  - name: users
  - name: audit
  - name: health

paths:
  /auth/login:
    post:
      tags: [auth]
      security: []
      summary: Email/password login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/TokenPair' } } } }

  /auth/refresh:
    post:
      tags: [auth]
      security: []
      summary: Exchange refresh token for new access token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/AccessToken' } } } }

  /graph/nodes:
    get:
      tags: [graph]
      summary: Paginated node list
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 500 }
        - in: query
          name: type
          schema: { $ref: '#/components/schemas/NodeType' }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/NodePage' } } } }

  /graph/nodes/{id}:
    get:
      tags: [graph]
      summary: Single node detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/KGNode' } } } }
        '404': { description: not found }
    delete:
      tags: [graph]
      summary: Soft-delete node
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: deleted }

  /graph/subgraph:
    get:
      tags: [graph]
      summary: Ego-network subgraph
      parameters:
        - in: query
          name: rootId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: depth
          schema: { type: integer, default: 2, minimum: 1, maximum: 4 }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/Subgraph' } } } }

  /graph/search:
    get:
      tags: [graph]
      summary: Full-text node search (Meilisearch-backed)
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 1, maxLength: 500 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/SearchResult' } } } }

  /connectors:
    get:
      tags: [connectors]
      summary: List connector configs for the authed user
      responses:
        '200': { description: ok, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/ConnectorSummary' } } } } }

  /connectors/{id}:
    patch:
      tags: [connectors]
      summary: Toggle enabled / change syncIntervalMinutes
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/ConnectorId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                syncIntervalMinutes: { type: integer, minimum: 1, maximum: 1440 }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/ConnectorSummary' } } } }
    delete:
      tags: [connectors]
      summary: Remove the connector config (revokes locally)
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/ConnectorId' }
      responses:
        '204': { description: removed }

  /connectors/{id}/sync:
    post:
      tags: [connectors]
      summary: Trigger manual sync (runs in the background)
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/ConnectorId' }
      responses:
        '202': { description: queued, content: { application/json: { schema: { $ref: '#/components/schemas/SyncJob' } } } }

  /oauth/connect/{connectorId}:
    post:
      tags: [oauth]
      summary: Begin an OAuth handshake — returns the URL to open in a popup
      parameters:
        - in: path
          name: connectorId
          required: true
          schema: { $ref: '#/components/schemas/ConnectorId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [redirectUri]
              properties:
                redirectUri: { type: string, format: uri }
                scopes:
                  type: array
                  items: { type: string }
                returnTo: { type: string }
      responses:
        '201':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [authorizeUrl, state]
                properties:
                  authorizeUrl: { type: string, format: uri }
                  state: { type: string }

  /oauth/callback/{connectorId}:
    get:
      tags: [oauth]
      security: []
      summary: OAuth provider redirect target — exchanges code for tokens
      parameters:
        - in: path
          name: connectorId
          required: true
          schema: { $ref: '#/components/schemas/ConnectorId' }
        - in: query
          name: code
          schema: { type: string }
        - in: query
          name: state
          schema: { type: string }
        - in: query
          name: error
          schema: { type: string }
      responses:
        '200': { description: handshake complete (HTML self-closing window) }
        '400': { description: invalid state, code, or provider error }

  /brain/insights/summary:
    get:
      tags: [brain-insights]
      summary: Combined dashboard payload — regions, top pathways, formations, growth
      parameters:
        - in: query
          name: topN
          schema: { type: integer, default: 10, minimum: 1, maximum: 50 }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/BrainInsightsSummary' } } } }

  /brain/insights/regions:
    get:
      tags: [brain-insights]
      summary: Per-region spike-rate histogram (last 30s)
      responses:
        '200': { description: ok, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/RegionActivity' } } } } }

  /brain/insights/pathways:
    get:
      tags: [brain-insights]
      summary: Top pathways — sort by strongest|growing|decaying
      parameters:
        - in: query
          name: sort
          schema: { type: string, enum: [strongest, growing, decaying], default: strongest }
        - in: query
          name: topN
          schema: { type: integer, default: 10 }
      responses:
        '200': { description: ok, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/PathwaySummary' } } } } }

  /brain/insights/formations:
    get:
      tags: [brain-insights]
      summary: Synapses that recently crossed the pathway-formation threshold
      responses:
        '200': { description: ok, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/PathwayFormation' } } } } }

  /brain/insights/growth:
    get:
      tags: [brain-insights]
      summary: Per-minute connectome size + mean weight
      responses:
        '200': { description: ok, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/ConnectomeSnapshot' } } } } }

  /users/me:
    get:
      tags: [users]
      summary: Current user profile
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/UserProfile' } } } }
    delete:
      tags: [users]
      summary: GDPR delete — purges all user data within 30 days (§10.3)
      responses:
        '202': { description: scheduled }

  /audit-log:
    get:
      tags: [audit]
      summary: Paginated audit log
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/AuditPage' } } } }

  /health:
    get:
      tags: [health]
      security: []
      summary: Liveness probe
      responses:
        '200': { description: ok, content: { application/json: { schema: { type: object, properties: { status: { type: string, enum: [ok] } } } } } }

  /health/ready:
    get:
      tags: [health]
      security: []
      summary: Readiness probe (checks dependencies)
      responses:
        '200': { description: ok }
        '503': { description: dependency unavailable }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    NodeType:
      type: string
      enum: [person, document, email, event, task, repository, commit, issue, pull_request, bookmark, note, concept]

    EdgeRelation:
      type: string
      enum: [MENTIONS, AUTHORED_BY, ASSIGNED_TO, RELATED_TO, PART_OF, LINKS_TO, REPLIED_TO, TAGGED_WITH, SCHEDULED_WITH, COMMITS_TO, CLOSES, REFERENCES]

    ConnectorId:
      type: string
      enum: [gmail, outlook_mail, notion, obsidian, roam, github, gitlab, google_calendar, outlook_calendar, todoist, linear, bookmarks]

    KGNode:
      type: object
      required: [id, label, type, createdAt, updatedAt, metadata, sourceId]
      properties:
        id: { type: string, format: uuid }
        label: { type: string }
        type: { $ref: '#/components/schemas/NodeType' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        metadata: { type: object, additionalProperties: true }
        sourceId: { $ref: '#/components/schemas/ConnectorId' }
        sourceUrl: { type: string, format: uri }
        embedding: { type: array, items: { type: number }, minItems: 384, maxItems: 384 }
        deletedAt: { type: string, format: date-time }

    KGEdge:
      type: object
      required: [id, source, target, relation, weight, inferred, createdAt, metadata]
      properties:
        id: { type: string, format: uuid }
        source: { type: string }
        target: { type: string }
        relation: { $ref: '#/components/schemas/EdgeRelation' }
        weight: { type: number, minimum: 0, maximum: 1 }
        inferred: { type: boolean }
        createdAt: { type: string, format: date-time }
        metadata: { type: object, additionalProperties: true }

    Subgraph:
      type: object
      required: [nodes, edges]
      properties:
        nodes: { type: array, items: { $ref: '#/components/schemas/KGNode' } }
        edges: { type: array, items: { $ref: '#/components/schemas/KGEdge' } }

    NodePage:
      type: object
      required: [nodes, nextCursor]
      properties:
        nodes: { type: array, items: { $ref: '#/components/schemas/KGNode' } }
        nextCursor: { type: string, nullable: true }

    AuditPage:
      type: object
      required: [events, nextCursor]
      properties:
        events:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              userId: { type: string, format: uuid }
              action: { type: string }
              resource: { type: string }
              resourceId: { type: string }
              metadata: { type: object, additionalProperties: true }
              createdAt: { type: string, format: date-time }
        nextCursor: { type: string, nullable: true }

    SearchResult:
      type: object
      required: [hits, query]
      properties:
        query: { type: string }
        hits: { type: array, items: { $ref: '#/components/schemas/KGNode' } }

    ConnectorConfig:
      type: object
      required: [id, userId, enabled, syncIntervalMinutes]
      properties:
        id: { $ref: '#/components/schemas/ConnectorId' }
        userId: { type: string, format: uuid }
        enabled: { type: boolean }
        syncIntervalMinutes: { type: integer, minimum: 1 }
        lastSyncAt: { type: string, format: date-time }
        lastSyncStatus: { type: string, enum: [success, partial, failed] }
        rateLimitRemaining: { type: integer }
        rateLimitResetsAt: { type: string, format: date-time }

    ConnectorSummary:
      type: object
      required: [id, enabled, syncIntervalMinutes, configured]
      properties:
        id: { $ref: '#/components/schemas/ConnectorId' }
        enabled: { type: boolean }
        syncIntervalMinutes: { type: integer, minimum: 1 }
        lastSyncAt: { type: string, format: date-time, nullable: true }
        lastSyncStatus: { type: string, enum: [success, partial, failed], nullable: true }
        rateLimitRemaining: { type: integer, nullable: true }
        rateLimitResetsAt: { type: string, format: date-time, nullable: true }
        configured: { type: boolean, description: 'true once OAuth has issued credentials for this connector' }

    RegionActivity:
      type: object
      required: [region, rate, count, color, label]
      properties:
        region:
          type: string
          enum: [sensory, memory, association, executive, motor, limbic]
        rate: { type: number, description: 'spikes per second over the last 30s' }
        count: { type: integer }
        color: { type: string }
        label: { type: string }

    PathwaySummary:
      type: object
      required: [synapseId, pre, post, weight, delta]
      properties:
        synapseId: { type: string }
        pre: { type: string }
        post: { type: string }
        weight: { type: number, minimum: 0, maximum: 1 }
        delta: { type: number, description: 'weight change since the insight service first observed this synapse' }
        lastChangeAt: { type: string, format: date-time }

    PathwayFormation:
      type: object
      required: [synapseId, pre, post, weight, formedAt]
      properties:
        synapseId: { type: string }
        pre: { type: string }
        post: { type: string }
        weight: { type: number, minimum: 0, maximum: 1 }
        formedAt: { type: string, format: date-time }

    ConnectomeSnapshot:
      type: object
      required: [at, neurons, synapses, meanWeight]
      properties:
        at: { type: string, format: date-time }
        neurons: { type: integer }
        synapses: { type: integer }
        meanWeight: { type: number, minimum: 0, maximum: 1 }

    BrainInsightsSummary:
      type: object
      required: [running, windowMs, regions, strongestPathways, growingPathways, decayingPathways, recentFormations, growth]
      properties:
        running: { type: boolean }
        windowMs: { type: integer }
        regions: { type: array, items: { $ref: '#/components/schemas/RegionActivity' } }
        strongestPathways: { type: array, items: { $ref: '#/components/schemas/PathwaySummary' } }
        growingPathways: { type: array, items: { $ref: '#/components/schemas/PathwaySummary' } }
        decayingPathways: { type: array, items: { $ref: '#/components/schemas/PathwaySummary' } }
        recentFormations: { type: array, items: { $ref: '#/components/schemas/PathwayFormation' } }
        growth: { type: array, items: { $ref: '#/components/schemas/ConnectomeSnapshot' } }

    SyncJob:
      type: object
      required: [jobId]
      properties:
        jobId: { type: string }

    UserProfile:
      type: object
      required: [id, email, locale, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        locale: { type: string }
        createdAt: { type: string, format: date-time }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }

    TokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }

    AccessToken:
      type: object
      required: [accessToken]
      properties:
        accessToken: { type: string }
