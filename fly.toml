app = "pkg-brain-9909"
primary_region = "sjc"

[build]
  dockerfile = "apps/api/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  type = "http"
  method = "get"
  path = "/health"
  interval = "30s"
  timeout = "4s"
  grace_period = "30s"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  CORS_ORIGINS = "https://graph.skdev-371.workers.dev"
  LOG_LEVEL = "info"
  # Allow the Cloudflare-hosted demo to ingest pasted text directly into the
  # public brain. `local` matches web/config.js → brainUserId. Add more ids
  # here (comma separated) to grant additional demo identities.
  PUBLIC_INGEST_USER_IDS = "local"
  BRAIN_AUTO_START_USER_IDS = "local"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
